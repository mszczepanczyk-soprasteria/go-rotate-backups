# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

env:
  - PROJECT_DESCRIPTION=
  - PROJECT_HOMEPAGE=https://github.com/mszczepanczyk-soprasteria/go-rotate-backups
  - LICENSE=MIT

before:
  hooks:
    - go mod tidy

builds:
- env:
    - CGO_ENABLED=0
  goos:
    - linux
    - darwin
    - windows
  goarch:
    - "386"
    - amd64
    - arm
    - arm64
  goarm:
    - "6"
    - "7"
  mod_timestamp: '{{ .CommitTimestamp }}'
  flags:
    - -trimpath
  ldflags:
    - '{{ .Env.VEMBED }}'

checksum:
  name_template: 'checksums.txt'

archives:
  - name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    format_overrides:
    - goos: windows
      formats: 
        - zip
    files:
      - README.md
      - LICENSE

homebrew_casks:
  - name: go-rotate-backups
    repository:
      owner: mszczepanczyk
      name: homebrew-tap
    homepage: "{{ .Env.PROJECT_HOMEPAGE }}"
    description: "{{ .Env.PROJECT_DESCRIPTION }}"
    license: "{{ .Env.LICENSE }}"
    dependencies: []

scoops:
  - name: go-rotate-backups
    repository:
      owner: mszczepanczyk
      name: scoop-bucket
    homepage: "{{ .Env.PROJECT_HOMEPAGE }}"
    description: "{{ .Env.PROJECT_DESCRIPTION }}"
    license: "{{ .Env.LICENSE }}"

nfpms:
  - file_name_template: '{{ .ConventionalFileName }}'
    id: packages
    homepage: "{{ .Env.PROJECT_HOMEPAGE }}"
    description: "{{ .Env.PROJECT_DESCRIPTION }}"
    maintainer: Maksymilian Szczepanczyk <m.szczepanczyk@ext.soprasteria.com>
    license: "{{ .Env.LICENSE }}"
    vendor: mszczepanczyk
    formats:
    - apk
    - deb
    - rpm
    dependencies: []
    recommends: []

